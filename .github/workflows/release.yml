name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  UV_PYTHON: "3.12"

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  quality:
    name: quality-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run python -c "import sys; print(sys.version); assert sys.version_info[:2] == (3, 12), sys.version"
      - run: uv run pytest
      - run: uv run ruff check .
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --check plugins/openclaw-xushi/dist/index.js

  python-package:
    name: python-package
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run python -c "import sys; print(sys.version); assert sys.version_info[:2] == (3, 12), sys.version"
      - run: uv build
      - run: uv run python scripts/prepare_release_assets.py --python-dist
      - uses: actions/upload-artifact@v4
        with:
          name: xushi-python-assets
          path: release-assets/*
          if-no-files-found: error

  binaries:
    name: binaries-${{ matrix.os }}
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run python -c "import sys; print(sys.version); assert sys.version_info[:2] == (3, 12), sys.version"
      - run: uv run --with pyinstaller python scripts/build_binaries.py
      - name: Smoke test binaries
        if: runner.os != 'Windows'
        run: |
          ./dist/xushi --help
          ./dist/xushi-daemon --help
      - name: Smoke test binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\dist\xushi.exe --help
          .\dist\xushi-daemon.exe --help
      - name: Smoke test Linux binaries in Ubuntu 26.04 userland
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            ubuntu:26.04 \
            bash -lc "/dist/xushi --help >/tmp/xushi-help && /dist/xushi-daemon --help >/tmp/daemon-help"
      - run: uv run python scripts/prepare_release_assets.py --binaries
      - uses: actions/upload-artifact@v4
        with:
          name: xushi-binaries-${{ matrix.os }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: publish-release
    needs: [python-package, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: xushi ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
