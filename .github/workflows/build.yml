name: build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  UV_PYTHON: "3.12"

jobs:
  python:
    name: python-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run python -c "import sys; print(sys.version); assert sys.version_info[:2] == (3, 12), sys.version"
      - run: uv run pytest
      - run: uv run python scripts/check_project_metadata.py
      - run: uv run ruff check .
      - run: uv build --wheel
      - run: uv run --with pyinstaller python scripts/build_binaries.py
      - name: Smoke test binaries
        if: runner.os != 'Windows'
        timeout-minutes: 2
        run: |
          ./dist/xushi --help
          ./dist/xushi-daemon --help
      - name: Smoke test binaries
        if: runner.os == 'Windows'
        timeout-minutes: 2
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          .\dist\xushi.exe --help
          .\dist\xushi-daemon.exe --help
      - run: uv run python scripts/prepare_release_assets.py --python-dist --binaries --output-dir build/release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: xushi-${{ matrix.os }}
          path: build/release-assets/*
          if-no-files-found: error

  openclaw-plugin:
    name: openclaw-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --check plugins/openclaw-xushi/dist/index.js
