name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv build --wheel
      - run: uv run --with pyinstaller python scripts/build_binaries.py
      - uses: actions/upload-artifact@v4
        with:
          name: xushi-${{ matrix.os }}
          path: |
            dist/**
            build/dist/**

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*
